  <rect width="100" height="100" rx="22" fill="url(#bg)" stroke="#00f5ff" stroke-width="2"/>
  <text x="49" y="66" font-family="'Outfit', system-ui, sans-serif" font-weight="900" font-size="46" fill="url(#textGrad)" filter="url(#glow)" text-anchor="middle" letter-spacing="-1">YS</text>
